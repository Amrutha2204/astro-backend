# ngrok config: run BOTH auth and astro with ONE agent (avoids "1 simultaneous session" limit).
#
# Setup:
# 1. Copy this to your ngrok config (Linux: ~/.config/ngrok/ngrok.yml)
#    or merge the "tunnels" block into your existing ngrok.yml.
# 2. Ensure "authtoken" is set (under top-level "agent:" or in the file).
# 3. Start backend: npm run start (auth on 8001, astro on 8002).
# 4. Run: ngrok start --all
#
# You'll get two URLs (e.g. https://xxx.ngrok-free.app for auth, https://yyy.ngrok-free.app for astro).
# Use them in the frontend .env.local as NEXT_PUBLIC_API_URL and NEXT_PUBLIC_ASTRO_API_URL.

version: "2"

tunnels:
  auth:
    addr: 8001
    proto: http
  astro:
    addr: 8002
    proto: http
